<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Uma mensagem pra você ❤️</title>
  <style>
    :root{
      --bg:#07070a;
      --txt:#f3f3f6;
      --muted:#b9b9c6;
      --red:#ff2a55;
      --red2:#ff3d7a;
      --stroke: rgba(255,255,255,.10);
      --radius: 22px;
      --shadow: 0 30px 90px rgba(0,0,0,.65);
      --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, Arial;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: var(--sans);
      color: var(--txt);
      background:
        radial-gradient(900px 520px at 50% 20%, rgba(255,42,85,.20), transparent 60%),
        radial-gradient(900px 520px at 20% 80%, rgba(255,61,122,.12), transparent 60%),
        var(--bg);
      overflow:hidden;
    }

    .hearts{
      position:fixed; inset:0;
      pointer-events:none;
      opacity:.75;
      filter: drop-shadow(0 10px 20px rgba(255,42,85,.15));
    }
    .heart{
      position:absolute;
      width:10px; height:10px;
      transform: rotate(45deg);
      background: rgba(255,42,85,.8);
      animation: floatUp linear infinite;
      border-radius: 2px;
    }
    .heart:before,.heart:after{
      content:"";
      position:absolute;
      width:10px; height:10px;
      background: inherit;
      border-radius: 50%;
    }
    .heart:before{ left:-5px; top:0; }
    .heart:after{ left:0; top:-5px; }
    @keyframes floatUp{
      0%{ transform: translateY(0) rotate(45deg); opacity:0; }
      10%{opacity:.95}
      100%{ transform: translateY(-120vh) rotate(45deg); opacity:0; }
    }

    .wrap{
      height:100%;
      display:grid;
      place-items:center;
      padding: 22px;
    }
    .card{
      width:min(760px, 100%);
      border-radius: var(--radius);
      border: 1px solid var(--stroke);
      background:
        radial-gradient(900px 520px at 30% 10%, rgba(255,42,85,.14), transparent 60%),
        linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      box-shadow: var(--shadow);
      padding: 22px;
      position:relative;
      overflow:hidden;
    }
    .card:after{
      content:"";
      position:absolute; inset:-50px;
      background: radial-gradient(circle at 70% 35%, rgba(255,61,122,.12), transparent 55%);
      pointer-events:none;
    }

    .top{
      display:flex;
      gap:14px;
      align-items:center;
      justify-content:space-between;
      flex-wrap:wrap;
      position:relative;
      z-index:1;
    }
    .badge{
      display:inline-flex;
      align-items:center;
      gap:10px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.06);
      padding: 10px 12px;
      border-radius: 999px;
      color: var(--muted);
      font-weight:700;
      width: fit-content;
    }
    .btn{
      display:inline-flex; align-items:center; justify-content:center;
      gap:10px;
      padding:10px 14px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.06);
      color: var(--txt);
      font-weight:800;
      cursor:pointer;
      user-select:none;
      transition: transform .12s ease, background .12s ease, border-color .12s ease;
    }
    .btn:hover{ transform: translateY(-1px); background: rgba(255,255,255,.09); border-color: rgba(255,255,255,.20); }

    h1{
      margin: 16px 0 8px;
      font-size: clamp(28px, 3.5vw, 44px);
      letter-spacing: -.8px;
      position:relative;
      z-index:1;
    }
    .msg{
      margin: 10px 0 16px;
      font-size: 18px;
      line-height: 1.6;
      color: rgba(243,243,246,.95);
      position:relative;
      z-index:1;
      white-space: pre-wrap;
    }
    .sig{
      margin-top: 10px;
      color: var(--muted);
      font-weight: 800;
      position:relative;
      z-index:1;
    }
    .hint{
      margin-top: 14px;
      color: rgba(185,185,198,.92);
      font-size: 13px;
      position:relative;
      z-index:1;
    }

    .bigHeart{
      position:absolute;
      right: -40px;
      top: -40px;
      width: 220px;
      height: 220px;
      transform: rotate(10deg);
      opacity:.15;
      filter: blur(.2px);
      pointer-events:none;
    }

    @media (max-width: 520px){
      .msg{font-size: 16px;}
    }
  </style>
</head>
<body>
  <div class="hearts" id="hearts" aria-hidden="true"></div>

  <div class="wrap">
    <div class="card">
      <svg class="bigHeart" viewBox="0 0 200 200" fill="none">
        <path d="M100 170s-60-38-82-78C2 60 18 30 52 30c18 0 32 9.5 48 26 16-16.5 30-26 48-26 34 0 50 30 34 62-22 40-82 78-82 78Z" fill="#ff2a55"/>
      </svg>

      <div class="top">
        <div class="badge">❤️ Uma mensagem especial</div>
        <button class="btn" id="shareBtn" type="button">Compartilhar</button>
      </div>

      <h1 id="title">Pra você</h1>
      <div class="msg" id="msg"></div>
      <div class="sig" id="sig"></div>
      <div class="hint">Se isso te fez sorrir, missão cumprida. 💘</div>
    </div>
  </div>

  <script>
    // floating hearts
    (function spawnHearts(){
      const box = document.getElementById('hearts');
      const count = 22;
      for(let i=0;i<count;i++){
        const h = document.createElement('div');
        h.className = 'heart';
        const left = Math.random()*100;
        const size = 8 + Math.random()*12;
        const dur = 8 + Math.random()*12;
        const delay = Math.random()*-dur;
        const opacity = 0.35 + Math.random()*0.55;
        h.style.left = left + 'vw';
        h.style.bottom = (-10 - Math.random()*30) + 'vh';
        h.style.width = size + 'px';
        h.style.height = size + 'px';
        h.style.opacity = opacity;
        h.style.animationDuration = dur + 's';
        h.style.animationDelay = delay + 's';
        box.appendChild(h);
      }
    })();

    function getParam(name){
      const url = new URL(window.location.href);
      return (url.searchParams.get(name) || "").trim();
    }

    const to = decodeURIComponent(getParam("to"));
    const from = decodeURIComponent(getParam("from"));
    const msg = decodeURIComponent(getParam("msg"));

    document.getElementById("title").textContent = to ? ("Para " + to + " ❤️") : "Pra você ❤️";
    document.getElementById("msg").textContent =
      msg || "Eu fiz essa página só pra você. Quando você lê isso, eu tô pensando em você. 💖";
    document.getElementById("sig").textContent = from ? ("— " + from) : "— com amor";

    document.getElementById("shareBtn").addEventListener("click", async () => {
      try{
        if(navigator.share){
          await navigator.share({ title: document.title, text: "Olha isso ❤️", url: window.location.href });
        }else{
          await navigator.clipboard.writeText(window.location.href);
          alert("Link copiado!");
        }
      }catch(e){
        // cancel share => ignore
      }
    });
  </script>
</body>
</html>
